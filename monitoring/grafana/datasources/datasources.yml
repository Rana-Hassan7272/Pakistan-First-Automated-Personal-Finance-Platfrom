apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: '*'
    editable: true
    jsonData:
      timeField: '@timestamp'
      esVersion: '8.0.0'
      maxConcurrentShardRequests: 5
      logMessageField: message
      logLevelField: fields.level
